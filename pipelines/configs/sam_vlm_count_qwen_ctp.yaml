name: sam_vlm_count_qwen_ctp
wandb_enabled: false
loader:
  source: labels/cb_412.json
  kwargs:
    image_dir: data/
models: {}
stages:
  - inputs:
      - [Image, human]
    output: SAMMasks
    processor: SAMAutoProcessor
  - inputs:
      - [SAMMasks, model]
    output: ObjectCoordinates
    processor: MaskCenterProcessor
  - inputs:
      - [Image, human]
      - [ObjectCoordinates, model]
    output: LabeledImage
    processor: LabeledImageProcessor
    kwargs:
      nms_radius_frac: 0.08
  - inputs:
      - [LabeledImage, model]
      - [TargetNoun, human]
      - [ObjectCoordinates, model]
    output: VLMGroupCount
    processor: VLMGroupCountProcessor
    kwargs:
      model_id: "Qwen/Qwen2.5-VL-7B-Instruct"
      mode: count_then_pick
  - inputs:
      - [Answer, human]
      - [VLMGroupCount, model]
    output: EvalResult
    processor: EvaluatorProcessor
