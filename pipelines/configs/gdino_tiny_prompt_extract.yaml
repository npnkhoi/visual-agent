name: gdino_tiny_prompt_extract
wandb_enabled: false
loader:
  source: labels/cb_412.json
  kwargs:
    image_dir: data/
models: {}
stages:
  - inputs:
      - [Question, human]
    output: DinoPrompt
    processor: DinoPromptProcessor
  - inputs:
      - [Image, human]
      - [DinoPrompt, model]
    output: DetectionResult
    processor: GroundingDinoProcessor
  - inputs:
      - [Answer, human]
      - [DetectionResult, model]
    output: EvalResult
    processor: EvaluatorProcessor
