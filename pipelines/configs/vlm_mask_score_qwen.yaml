name: vlm_mask_score_qwen
wandb_enabled: false
loader:
  source: labels/cb_412.json
  kwargs:
    image_dir: data/
models: {}
stages:
  - inputs:
      - [Image, human]
      - [Question, human]
    output: MaskScores
    processor: VLMMaskScoreProcessor
    kwargs:
      model_id: "Qwen/Qwen2.5-VL-7B-Instruct"
  - inputs:
      - [MaskScores, model]
    output: VLMCount
    processor: BestCountProcessor
  - inputs:
      - [Answer, human]
      - [VLMCount, model]
    output: EvalResult
    processor: EvaluatorProcessor
